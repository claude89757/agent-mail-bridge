name: Release

# Publish-on-tag. Pushing a v* tag builds, gates, publishes to npm and cuts a
# GitHub Release. No long-lived credentials: npm publish authenticates via OIDC
# trusted publishing (configured on npmjs.com for this repo + this workflow) and
# provenance is automatic; the Release uses the built-in GITHUB_TOKEN. See
# docs/releasing.md and ADR-0005.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC for npm trusted publishing (auth + provenance)

jobs:
  release:
    name: publish npm + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Fail closed if the tag and package.json disagree: a release must ship
      # exactly the version it claims. The ref is read from the environment,
      # never interpolated into the script, to avoid tag-name injection.
      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag != package.json version $pkg"
            exit 1
          fi

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

      # OIDC trusted publishing needs npm >= 11.5.1; the runner's bundled npm is
      # older. No token: npm authenticates via the GitHub Actions OIDC identity
      # (id-token: write) against the trusted publisher configured on npmjs.com,
      # and generates provenance automatically.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # Makes a failed publish self-diagnosing. OIDC trusted publishing requires
      # npm >= 11.5.1 AND node >= 22.14.0; npm prioritizes OIDC over tokens when
      # both hold. So if these print compliant versions and publish still returns
      # E404, OIDC was ATTEMPTED and REJECTED — i.e. the trusted-publisher record
      # on npmjs.com does not match this repo/workflow — rather than the CLI
      # being too old to try. Added after the v0.2.0 attempt failed ambiguously.
      - name: Report toolchain versions (OIDC preconditions)
        run: |
          node --version
          npm --version

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          printf 'npm: https://www.npmjs.com/package/agent-mail-bridge/v/%s\n\nChangelog: https://github.com/%s/blob/%s/CHANGELOG.md\n' \
            "$ver" "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" > release-notes.md
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
